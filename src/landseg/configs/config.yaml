# Main entry to the config tree
defaults:
  - _self_
  # data-side
  - artifacts: default
  - dataprep: default
  - dataset: demo
  - domain: demo
  - extent: demo
  - grid: base
  # training-side
  - experiment: demo
  - models: multihead
  - trainer: default

# running mode
run_mode: 'end-to-end'
overfit_test_max_epoch: 2000

# experiment root
exp_root: ./experiment

# dev-facing local override; optional and untracked
dev_settings_path: ${oc.env:AUX_SETTINGS_PATH, null}

# hydra settings
hydra:
  run:
    dir: .
  output_subdir: null