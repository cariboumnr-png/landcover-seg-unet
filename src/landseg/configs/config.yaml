# Main entry to the config tree
defaults:
  - _self_
  # data foundation
  - foundation/grid: default
  - foundation/domains: default
  - foundation/datablocks: default
  # data transfrom
  - transform: default
  # data specs
  - dataspecs: default
  # models
  - models: default
  # session
  - session/components: default
  - session/runtime: default
  - session/phases: default
  # pipeline
  - pipeline: default
  # optuna sweeper
  - _optuna: default

# execution options
execution:
  exp_root: ./experiment
  dev_settings: ${oc.env:AUX_SETTINGS_PATH, null} # dev only

# hydra settings
hydra:
  run:
    dir: .
  output_subdir: null
  sweeper:
    _target_: hydra_plugins.hydra_optuna_sweeper.OptunaSweeper
    direction: maximize # or minimize
    n_trials: 50
    sampler:
      _target_: optuna.samplers.TPESampler
      seed: 42
    storage: sqlite:///optuna.db
    study_name: my_experiment
    load_if_exists: true
