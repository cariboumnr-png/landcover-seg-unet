# Main entry to the config tree
defaults:
  - _self_
  # data foundation
  - foundation/grid: default
  - foundation/domains: default
  - foundation/datablocks: default
  # data transfrom
  - transform: default
  # data specs
  - dataspecs: default
  # models
  - models: default
  # session
  - session: default
  # study
  - study: default
  # pipeline
  - pipeline: default

# execution options
execution:
  exp_root: ./experiment
  verbosity: select # 'full', 'select', 'silent'
  dev_settings: ${oc.env:AUX_SETTINGS_PATH, null} # dev only

# hydra settings
hydra:
  run:
    dir: .
  output_subdir: null
