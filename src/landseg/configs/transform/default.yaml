# filtering thresholds for valid blocks
threshold:
  # minimum valid pixel ratio threshold for dev blocks
  blk_thres_dev: 0.75
  # minimum valid pixel ratio threshold for test blocks
  blk_thres_test: 0.1

# blocks partition
partition:
  val_ratio: 0.1
  test_ratio: 0.0
  buffer_step: 1

# block scoring parameters
scoring:
  # classes to reward (1-based)
  reward: {}
  # Inverse distribution alpha
  alpha: 1.0
  # L1 weight reward beta
  beta: 0.0

# hydration
hydration:
  max_skew_rate: 10.0
