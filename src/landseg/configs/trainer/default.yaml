# loader config
loader:
  patch_size: 128
  batch_size: 16

# loss config
loss:
  alpha_fn: 'effective_n'
  en_beta: 0.999
  types:
    focal:
      weight: 0.5
      gamma: 2.0
      reduction: 'mean'
    dice:
      weight: 0.5
      smooth: 1.0
    spectral:
      weight: 1e-3
      alpha: 1.0
      neighbour: 4
    tv:
      weight: 1e-4

# optimizer and scheduler config
optimization:
  opt_cls: 'AdamW'
  lr: 1e-4
  weight_decay: 1e-3
  sched_cls: 'CosAnneal'
  sched_args:
    T_max: 50

# runtime config
runtime:
  data:
    domain_ids_name: ecodist
    domain_vec_name: geology
  schedule:
    max_epoch: 50
    max_step: 1000000
    log_every: 50
    val_every: 1
    ckpt_every: 5
    patience: 10
    min_delta: 0.0005
  monitor:
    metric_name: iou
    track_head_name: base
    track_mode: max
  precision:
    use_amp: True
  optimization:
    grad_clip_norm: 1.0
