default:
  name: default
  # single dummy training phase
  phases:
    - name: single_phase_parent
      num_epochs: 30
      lr_scale: 1.0
      active_heads: [base]
      frozen_heads: null

baseline:
  name: baseline
  select_children: []
  # default top-down phase schema
  phases:
    - name: parent_head
      num_epochs: 15
      lr_scale: 1.0
      active_heads: [base]
      frozen_heads: null


    - name: select_children_heads
      num_epochs: 20
      lr_scale: 1.0
      active_heads: ${concat:[base],${session.phases.baseline.select_children}}
      frozen_heads: [base]


    - name: joint_tuning
      num_epochs: 10
      lr_scale: 1.0
      active_heads: ${concat:[base],${session.phases.baseline.select_children}}
      frozen_heads: null
