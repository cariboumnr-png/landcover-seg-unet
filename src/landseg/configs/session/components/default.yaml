# loader config
loader:
  patch_size: 128
  batch_size: 16

# task: loss config
task:
  alpha_fn: 'effective_n'
  en_beta: 0.999
  excluded_cls: {}
  types:
    focal:
      weight: 0.5
      gamma: 2.0
      reduction: 'mean'
    dice:
      weight: 0.5
      smooth: 1.0
    spectral:
      weight: 1e-3
      alpha: 1.0
      neighbour: 4
    tv:
      weight: 1e-4

# optimizer and scheduler config
optimization:
  opt_cls: 'AdamW'
  lr: 1e-4
  weight_decay: 1e-3
  sched_cls: 'CosAnneal'
  sched_args:
    T_max: 50
