# NOTES
# for two floats: [low, high]
# for three integers: [low, high, step]
# for categorical variables: [val1, val2, val3]

base:
  learning_rate: [1e-5, 1e-1]
  batch_size: [16, 64, 16]

optimizer:
  learning_rate: [1e-5, 1e-1]
  weight_decay: [1e-6, 1e-2]

throughput:
  batch_size: [16, 64, 16]
  use_amp: [true, false]

data_geometry:
  patch_size: [64, 128, 64]
  batch_size: [16, 64, 16]

context_window:
  patch_size: [64, 128, 64]

architecture:
  model_body: ['unet', 'unetpp', 'unetppp']
  base_channel: [16, 64, 16]
  bottleneck: ['conv', 'transformer', 'hybrid']

bottleneck:
  bottleneck: ['conv', 'transformer', 'hybrid']
  num_conv_blocks: [1, 4, 1]
  num_transformer_blocks: [1, 4, 1]
  num_heads: [2, 4, 8]
  mlp_ratio: [1.0, 4.0]
  dropout: [0.0, 0.5]
  attn_dropout: [0.0, 0.5]

conditioning:
  conditioners: [[], ['film'], ['concat'], ['film', 'concat']]

loss_balance:
  focal_weight: [0.0, 1.0]
  dice_weight: [0.0, 1.0]

loss_auxiliary:
  spectral_weight: [0.0, 1e-2]
  tv_weight: [0.0, 1e-3]

regularization:
  consistency_lambda: [0.0, 1.0]

head_weights:
  logit_adjust_alpha: [0.0, 2.0]

mtl_joint:
  consistency_lambda: [0.0, 1.0]
  logit_adjust_alpha: [0.0, 2.0]

hierarchy:
  consistency_lambda: [0.0, 1.0]
  consistency_reduction: ['mean', 'sum']
