schedule:
  val_every_n_epoch: 1
  infer_every_n_epoch: 1
  ckpt_every_n_epoch: 5
  update_loss_every_n_batch: 50
  resume_from_last: False

monitor:
  metric_name: iou
  track_heads: {}
  track_mode: max
  allow_early_stop: True
  patience: 10
  min_delta: 0.0005

curriculum:
  schema: single

  # single training phase on the parent head only
  single:
    name: single
    phases:
      - name: single_phase_parent
        num_epochs: 10
        start_epoch: 1
        lr_scale: 1.0
        active_heads: [base]
        frozen_heads: null

  # default top-down phase schema
  baseline:
    name: baseline
    phases:
      - name: parent_head
        num_epochs: 15
        start_epoch: 1
        lr_scale: 1.0
        active_heads: [base]
        frozen_heads: null

      - name: refine_head_reclass_1
        num_epochs: 20
        start_epoch: 1
        lr_scale: 1.0
        active_heads: [reclass_1]
        frozen_heads: [base]

      - name: joint_tuning
        num_epochs: 10
        start_epoch: 1
        lr_scale: 1.0
        active_heads: [base, reclass_1]
        frozen_heads: null

  # custom multi-phases template
  custom:
    name: custom
    phases:
      - name: phase_0
        num_epochs: 0
        start_epoch: 1
        lr_scale: 1.0
        active_heads: null
        frozen_heads: null