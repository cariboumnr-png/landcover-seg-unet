# engine tasks settings

# head specs
alpha_fn: 'effective_n' # effective_n | inverse
en_beta: 0.999
excluded_cls: {}

# perhead losses
loss_configs:
  focal:
    weight: 0.5
    gamma: 2.0
    reduction: 'mean'
  dice:
    weight: 0.5
    smooth: 1.0
  spectral:
    weight: 1e-3
    alpha: 1.0
    neighbour: 4
  tv:
    weight: 1e-4

# multi task (multihead) learning related
mtl_constraints: []

mtl_reg_configs:
  consistency_lambda: 0.05
  consistency_reduction: mean