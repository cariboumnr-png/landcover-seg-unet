# configuration for building multihead model
use_body: unet

body_registry:
  unet:
    body: unet
    base_ch: 32
    conv_params:
      downs:
        norm: gn
        gn_groups: 8
        p_drop: 0.0
      ups:
        norm: gn
        gn_groups: 8
        p_drop: 0.0
  unetpp:
    body: unetpp
    base_ch: 32
    conv_params:
      downs:
        norm: gn
        gn_groups: 8
        p_drop: 0.0
      nodes:
        norm: gn
        gn_groups: 8
        p_drop: 0.0

# conditioning
conditioning:
  # mode of conditioning: 'none', 'concat', 'film', 'hybrid'
  mode: 'hybrid'
  # concat pathway
  concat:
    out_dim: 4
    use_ids: True
    use_vec: True
    use_mlp: True
  # FiLM pathway
  film:
    embed_dim: 4
    use_ids: True
    use_vec: True
    hidden: 128

# numerical safety
clamp_range: [1e-4, 1e4]

# runtime flags - don't modify unless debugging
flags:
  enable_logit_adjust: True
  enable_clamp: True