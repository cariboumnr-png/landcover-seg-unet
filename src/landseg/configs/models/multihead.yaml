# configuration for building multihead model
body:
  unet:
    base_ch: 32
    conv_params:
      downs:
        norm: gn
        gn_groups: 8
        p_drop: 0.0
      ups:
        norm: gn
        gn_groups: 8
        p_drop: 0.0
  unetpp:
    base_ch: 32
    conv_params:
      downs:
        norm: gn
        gn_groups: 8
        p_drop: 0.0
      nodes:
        norm: gn
        gn_groups: 8
        p_drop: 0.0

# conditioning
conditioning:
  # mode of conditioning: 'none', 'concat', 'film', 'hybrid'
  mode: 'hybrid'
  # concat pathway
  concat_out_dim: 4
  concat_use_ids: True
  concat_use_vec: True
  concat_use_mlp: True
  # FiLM pathway
  film_embed_dim: 4
  film_use_ids: True
  film_use_vec: True
  film_hidden: 128

# numerical safety
clamp_range: [1e-4, 1e4]

# runtime flags - don't modify unless debugging
flags:
  enable_logit_adjust: True
  enable_clamp: True