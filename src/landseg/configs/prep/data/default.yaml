# artifacts saving dirs
artifacts:
  foundation: ${exp_root}/artifacts/foundation
  transform: ${exp_root}/artifacts/transform

# general settings
general:
  ignore_index: 255
  image_dem_pad: 8

# filtering thresholds for valid blocks
threshold:
  # minimum valid pixel ratio threshold for fit blocks
  blk_thres_fit: 0.75
  # minimum valid pixel ratio threshold for test blocks
  blk_thres_test: 0.1

# blocks partition
partition:
  val_ratio: 0.1
  test_ratio: 0.0
  buffer_step: 1

# block scoring parameters
scoring:
  # classes to reward (1-based)
  reward: {}
  # Inverse distribution alpha
  alpha: 1.0
  # L1 weight reward beta
  beta: 0.0

# hydration
hydration:
  max_skew_rate: 10.0
