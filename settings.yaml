# ================================USER SETTINGS================================

# ----- Experiment Master I/O Location
exp_root: ./experiment

# running mode
run_mode: 'end-to-end'
overfit_test_max_epoch: 2000

# ----- Study Area Extent Definition
extent:
  crs: 'EPSG:3161'
  mode: ref
  inputs:
    # when mode='ref' provide:
    dirpath: ${exp_root}/input/extent_ref
    filename: 'on_3161_30m.tif'
    # when mode='aoi' or 'tiles' provide:
    origin: [0.0, 0.0] # x, y in CRS units
    pixel_size: [0.0, 0.0] # x, y positive magnitudes
    # when mode='aoi', also provide:
    grid_extent: [0.0, 0.0] # height and width in CRS units
    # when mode='tiles', also provide:
    grid_shape: [0, 0] # rows and cols as number of tiles

# ----- World Grid Specifications
grid:
  tile_size:
    row: 256
    col: 256
  tile_overlap:
    row: 0
    col: 0

# ----- Source of Domain Knowledge
domain:
  dirpath: ${exp_root}/input/domain
  files:
    - name: geology.tif
      index_base: 1
    - name: ecodistrict.tif
      index_base: 1
  use_type:
    ids: ecodistrict
    vec: geology

# ----- Data preparation
dataprep:
  # filtering thresholds for valid blocks
  threshold:
    # minimum valid pixel ratio threshold for fit blocks
    blk_thres_fit: 0.75
    # minimum valid pixel ratio threshold for test blocks
    blk_thres_test: 0.05

# ----- Source of Fit and Test (optional) Data
dataset:
  # name of the dataset
  name: demo_data
  # input fit data
  fit:
    image: ${exp_root}/input/${dataset.name}/fit/image.tif
    label: ${exp_root}/input/${dataset.name}/fit/label_lctype.tif
  # input test data (optional)
  test:
    image: ${exp_root}/input/${dataset.name}/test/image.tif
    label: ${exp_root}/input/${dataset.name}/test/label_lctype.tif
  # data configuration
  config: ${exp_root}/input/${dataset.name}/configs/lctype.json

# ----- Model Features
models:
  # mode of conditioning: 'none', 'concat', 'film', 'hybrid'
  conditioning:
    mode: 'hybrid'

# ----- Trainer Runtime Settings
trainer:
  runtime:
    data:
      domain_ids_name: ecodist
      domain_vec_name: geology
    schedule:
      patience: 10
      min_delta: 0.0005
    monitor:
      track_head_name: layer1

# ----- Learning Phases
experiment:
  # phases
  phases:
    - name: coarse_head
      num_epochs: 100
      heads:
        active_heads: [layer1]
        frozen_heads: null
        masked_classes: null
      logit_adjust:
        train: False
        val: False
        test: False
        alpha: 1.0
      lr_scale: 1.0
