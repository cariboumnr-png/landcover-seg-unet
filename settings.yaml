# =============================================================================
# USER SETTINGS / PARAMÈTRES UTILISATEUR
# This file lets you configure the project without modifying internal code.
# Adjust only the items needed for your analysis.
#
# Ce fichier vous permet de configurer le projet sans modifier le code interne.
# Modifiez uniquement les éléments nécessaires à votre analyse.
#
# IMPORTANT / IMPORTANT :
#   - Do NOT edit anything inside ${...}. These are system-generated links
#     called "interpolation keys."
#   - Ne PAS modifier le texte dans ${...}. Ce sont des références générées
#     par le système (« clés d’interpolation »).
#
#   - All folders inside the experiment root MUST follow the required structure.
#   - Tous les dossiers à l’intérieur de la racine du projet DOIVENT suivre
#     la structure requise.
# =============================================================================


# =============================================================================
# REQUIRED PROJECT FOLDER STRUCTURE
# STRUCTURE REQUISE DES DOSSIERS DU PROJET
#
#   exp_root/
#   ├── input/
#   │   ├── extent_ref/
#   │   │    └── example_extent.tif
#   │   ├── domain/
#   │   │    └── example_domain_1.tif, example_domain_2.tif, ...
#   │   └── dataset_name/
#   │        ├── dev/
#   │        │    ├── example_image.tif
#   │        │    └── example_label.tif
#   │        ├── test/       (optional / optionnel)
#   │        │    ├── example_image.tif
#   │        │    └── example_label.tif
#   │        └── example_config.json
#
# =============================================================================


# -----------------------------------------------------------------------------
# PROJECT ROOT / RACINE DU PROJET
# User-selected folder containing all project inputs, prepared artifacts,
# run outputs, logs, and results.
#
# Dossier choisi par l’utilisateur contenant toutes les entrées du projet,
# les artefacts préparés, les sorties d’exécution, les journaux et les résultats.
# -----------------------------------------------------------------------------
execution:
  exp_root: ./experiment


# -----------------------------------------------------------------------------
# INPUT DEFINITIONS / DÉFINITION DES ENTRÉES
# Defines the spatial extent reference, domain rasters, and raw dataset files
# used to build prepared artifacts for training and evaluation.
#
# Définit la référence d’étendue spatiale, les rasters thématiques et les
# fichiers bruts du jeu de données utilisés pour construire les artefacts
# préparés pour l’entraînement et l’évaluation.
# -----------------------------------------------------------------------------
# PRE-PROCESSING & GRID / PRÉ-TRAITEMENT ET GRILLE
foundation:
  grid:
    mode: ref          # Fixed to 'ref' / Fixé à 'ref'
    crs: 'EPSG:3161'   # Coordinate reference system / Système de coordonnées
    extent:
      # Located in / Situé dans : ${exp_root}/input/extent_ref/
      filename: 'example_extent.tif'
    tile_specs:
      size_row: 256
      size_col: 256
      overlap_row: 0
      overlap_col: 0

# DOMAIN KNOWLEDGE LAYERS / COUCHES THÉMATIQUES
# Place ANY NUMBER of domain rasters in / Placez AUTANT de rasters que voulu dans :
# ${exp_root}/input/domain/
#
# These rasters are optional model inputs used for domain conditioning.
# Ces rasters sont des entrées optionnelles du modèle utilisées pour le
# conditionnement thématique.
  domains:
    files:
      - name: 'example_domain_1.tif'
        index_base: 1
      - name: 'example_domain_2.tif'
        index_base: 1

# RAW DATASET / JEU DE DONNÉES BRUT
# Located in / Situé dans : ${exp_root}/input/${foundation.datablocks.name}/
#
# - dev/  : required development data used to create train/validation artifacts
# - test/ : optional holdout data used for standalone evaluation
# - configs/ : dataset-specific metadata/configuration
#
# - dev/  : données de développement requises pour créer les artefacts
#           d’entraînement/validation
# - test/ : données de réserve optionnelles utilisées pour l’évaluation autonome
# - configs/ : métadonnées / configuration propres au jeu de données
  datablocks:
    name: dataset_name  # Dataset folder name / Nom du dossier du jeu de données
    filenames:
      # Files in / Fichiers dans .../dev/
      dev_image: 'example_image.tif'
      dev_label: 'example_label.tif'
      # Files in / Fichiers dans .../test/
      test_image: 'example_image.tif'
      test_label: 'example_label.tif'
      # File in / Fichier dans .../
      config: 'example_config.json'


# -----------------------------------------------------------------------------
# DATA PREPARATION SETTINGS / PARAMÈTRES DE PRÉPARATION DES DONNÉES
# Controls how raw blocks are partitioned and balanced when building prepared
# dataset artifacts for training and evaluation.
#
# Contrôle la façon dont les blocs bruts sont partitionnés et équilibrés lors
# de la création des artefacts préparés pour l’entraînement et l’évaluation.
# -----------------------------------------------------------------------------
transform:

  # BLOCK PARTITION / PARTITION DES BLOCS
  # Proportions used to split prepared development data into validation and test.
  # The remaining data is assigned to training.
  #
  # Proportions utilisées pour séparer les données préparées de développement
  # en validation et en test. Le reste est attribué à l’entraînement.
  partition:
    val_ratio: 0.1
    test_ratio: 0.0

  # BLOCK SCORING PARAMETERS / PARAMÈTRES DE PONDÉRATION DES BLOCS
  # Optional class-priority weights used during block selection.
  # Class indices are 1-based in this user file.
  #
  # Poids optionnels de priorité par classe utilisés lors de la sélection
  # des blocs. Les indices de classe sont basés sur 1 dans ce fichier utilisateur.
  scoring:
    reward: {}

  # HYDRATION / HYDRATATION
  # Controls how aggressively extra training blocks are added to improve
  # class balance.
  #
  # Contrôle à quel point des blocs d’entraînement supplémentaires sont ajoutés
  # pour améliorer l’équilibre entre les classes.
  hydration:
    max_skew_rate: 10.0


# -----------------------------------------------------------------------------
# MODEL ARCHITECTURE / ARCHITECTURE DU MODÈLE
# Controls how the model uses optional domain information.
#
# Contrôle la manière dont le modèle utilise les informations thématiques
# optionnelles.
# -----------------------------------------------------------------------------
models:
  conditioning:
    # Integration mode for domain data / Mode d'intégration des données thématiques
    # Options: null | concat | film | hybrid
    mode: 'hybrid'


# -----------------------------------------------------------------------------
# DATA SPECIFICATION / SPÉCIFICATION DES DONNÉES
# Selects which domain layer is used as discrete IDs and which one is used
# as continuous feature vectors.
#
# Sélectionne quelle couche thématique est utilisée comme identifiants discrets
# et laquelle est utilisée comme vecteurs de caractéristiques continus.
# -----------------------------------------------------------------------------
dataspecs:
  domain_ids_name: example_domain_1
  domain_vec_name: example_domain_2


# -----------------------------------------------------------------------------
# SESSION RUNTIME / EXÉCUTION DE SESSION
# Controls monitoring and stopping behavior during model training.
#
# Contrôle le suivi et les conditions d’arrêt pendant l’entraînement du modèle.
# -----------------------------------------------------------------------------
session:

  # knobs
  resume_from_last: False
  mode: continuous
  phase_schema: default

  # components
  components:
    task:
      excluded_cls: {}

  # sub config groups
  runtime:

    monitor:
      # Head used for validation tracking, early stopping, and best-checkpoint
      # selection.
      #
      # Tête utilisée pour le suivi en validation, l’arrêt anticipé et la
      # sélection du meilleur point de sauvegarde.
      track_heads: [base]
      patience: 10      # Stop if validation does not improve / Arrêt si la validation ne s’améliore pas
      min_delta: 0.0005 # Minimum improvement to count as progress / Amélioration minimale considérée comme un progrès

    logit_adjust:
      # Optional class-imbalance correction / Correction optionnelle du déséquilibre des classes
      logit_adjust_alpha: 1.0  # Strength of adjustment / Intensité de l’ajustement
      enable_train_logit_adjustment: False
      enable_eval_logit_adjustment: False


# -----------------------------------------------------------------------------
# TRAINING PHASES / PHASES D’ENTRAÎNEMENT
# Defines the curriculum used by the training session.
#
# Définit la progression (curriculum) utilisée par la session d’entraînement.
# -----------------------------------------------------------------------------

  phases:
    baseline:
      select_children: []
