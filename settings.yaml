exp_root: ./experiment

inputs:
  extent:
    crs: 'EPSG:3161'
    mode: ref
    inputs:
      filename: 'on_3161_30m.tif'

  domain:
    files:
      - filename: geology.tif
        index_base: 1
      - filename: ecodistrict.tif
        index_base: 1

  data:
    name: demo_data
    filenames:
      fit_image: image.tif
      fit_label: label_lctype.tif
      test_image: image.tif
      test_label: label_lctype.tif
      config: lctype.json

prep:
  grid:
    tile_size:
      row: 256
      col: 256
    tile_overlap:
      row: 0
      col: 0

  domain:
    as_ids: ecodistrict
    as_vec: geology

models:
  conditioning:
    mode: 'hybrid'

trainer:
  runtime:
    data:
      domain_ids_name: ecodist
      domain_vec_name: geology
    schedule:
      patience: 10
      min_delta: 0.0005
    monitor:
      track_head_name: layer1

controller:
  phases:
    - name: coarse_head
      num_epochs: 100
      heads:
        active_heads: [layer1]
        frozen_heads: null
        masked_classes: null
      logit_adjust:
        train: False
        val: False
        test: False
        alpha: 1.0
      lr_scale: 1.0
