# =============================================================================
# USER CONFIGURATION
# -----------------------------------------------------------------------------
# This file defines the minimal inputs required to run an experiment.
#
# Guidelines:
# - Provide all dataset paths and spatial settings under `foundation`
# - Optional parameters have safe defaults and can be omitted
# - All values are validated before execution
# - Prefer absolute paths for portability and reproducibility
# -----------------------------------------------------------------------------

# -----------------------------------------------------------------------------
# PROJECT SETUP
# -----------------------------------------------------------------------------
execution:
  exp_root: ./experiment   # root directory for all outputs

# -----------------------------------------------------------------------------
# DATA INPUTS (REQUIRED)
# -----------------------------------------------------------------------------
foundation:

  # ---------------------------------------------------------------------------
  # GRID DEFINITION (spatial reference + tiling)
  # ---------------------------------------------------------------------------
  grid:
    mode: ref
    crs: EPSG:2958   # MUST be a valid projected CRS (EPSG:XXXX)
    extent:
      filepath: ./experiment/input/extent_reference/example_extent.tif
    tile_specs:
      size_row: 256
      size_col: 256
      overlap_row: 128   # controls tile overlap (affects augmentation)
      overlap_col: 128

  # ---------------------------------------------------------------------------
  # DOMAIN FEATURES (OPTIONAL CONTEXT LAYERS)
  # ---------------------------------------------------------------------------
  domains:
    # External rasters used for conditioning or feature augmentation
    # Each file can be used as categorical (IDs) or continuous (vector)
    files:
      - path: ./experiment/input/domain_knowledge/example_domain_1.tif
        index_base: 1
      - path: ./experiment/input/domain_knowledge/example_domain_2.tif
        index_base: 1

  # ---------------------------------------------------------------------------
  # DATASET (REQUIRED)
  # ---------------------------------------------------------------------------
  datablocks:
    name: demo_data
    filepaths:
      # Development data (REQUIRED)
      dev_image: ./experiment/input/data/demo_data/dev/example_image.tif
      dev_label: ./experiment/input/data/demo_data/dev/example_label.tif

      # Test data (OPTIONAL, must be paired if provided)
      test_image: ./experiment/input/data/demo_data/test/example_image.tif
      test_label: ./experiment/input/data/demo_data/test/example_label.tif

      # Dataset metadata/config (REQUIRED)
      config: ./experiment/input/data/demo_data/example_config.json

# -----------------------------------------------------------------------------
# DATA PREPARATION (OPTIONAL — defaults are safe)
# -----------------------------------------------------------------------------
# Controls dataset splitting and class balancing behavior.
#
# Concepts:
# - validation/test splits: how blocks are partitioned
# - target_head: target label head for oversampling
# - reward_classes: increases sampling probability for specific classes (0-based)
#
# Notes:
# - Test split is ignored if explicit test dataset is provided
# - Oversampling is disabled if reward_classes is empty or target_head is null
# -----------------------------------------------------------------------------
transform:
  # dataset split ratios for validation and testing
  partition:
    val_ratio: 0.15
    test_ratio: 0.10

  # oversampling target (set null to disable)
  target_head: null
  # class reweighting for oversampling (0-based class indices)
  reward_classes: {}

# Basic runtime configs
dataspecs:
  # which domain to be used as categorical (ids) or continuous (vec)
  domain_ids_name: null
  domain_vec_name: null

# model body and bottleneck
models:
  model_body: unetppp
  bottleneck: transformer
  conditioners: [concat, film]

session:

  data_loader:
    patch_size: 128 # needs to be divisible by data tile size
    batch_size: 16 # higher means more GPU mem

  orchestration:
    curriculum:
      single:
        phases:
          name: demo_train
          num_epochs: 10