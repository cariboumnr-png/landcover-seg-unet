# =============================================================================
# USER CONFIGURATION
# -----------------------------------------------------------------------------
# This file provides inputs for the three sequential experiment pipelines:
#
#   1. data-ingest: Ingests datasets, grid references, & domains.
#      - Typically run once (unless raw input datasets/rasters change).
#
#   2. data-prepare: Handles block splits & class balancing.
#      - The middle preparation layer, occasionally adjusted.
#
#   3. model-train: Configures model structure & session params.
#      - Modified frequently during iterative modeling/hyperparameter tuning.
# =============================================================================

# exp_root: root directory for all experiment outputs, logs, and checkpoints
exp_root: ./experiment

data-ingest:
  # ---------------------------------------------------------------------------
  # Spatial reference & grid tiling details
  # ---------------------------------------------------------------------------
  # grid_crs: must be a valid projected Coordinate Reference System (e.g., EPSG:XXXX)
  grid_crs: EPSG:2958  
  # grid_extent_path: path to the reference raster defining extent (required for mode: ref)
  grid_extent_path: ./experiment/input/extent_reference/example_extent.tif
  # tile_size: tile dimension in pixels (both row and column sizes)
  tile_size: 256
  # tile_overlap: tile overlap in pixels (used for spatial augmentation/coverage)
  tile_overlap: 128

  # ---------------------------------------------------------------------------
  # Domain Rasters (Optional auxiliary context layers)
  # ---------------------------------------------------------------------------
  # domain_files: external rasters used for conditioning or feature augmentation
  domain_files:
    - path: ./experiment/input/domain_knowledge/example_domain_1.tif
      index_base: 1
    - path: ./experiment/input/domain_knowledge/example_domain_2.tif
      index_base: 1    
  # domain_ids_name: which domain layer to be used as categorical IDs (set null to disable)
  domain_ids_name: null
  # domain_vec_name: which domain layer to be used as continuous vectors (set null to disable)
  domain_vec_name: null

  # ---------------------------------------------------------------------------
  # Datablock Inputs (Required raster inputs & metadata)
  # ---------------------------------------------------------------------------
  # dataset_name: unique name identifying this dataset configuration
  dataset_name: demo_data
  # dev_image: path to the training/development image raster (e.g. multi-band geotiff)
  dev_image: ./experiment/input/data/demo_data/dev/example_image.tif
  # dev_label: path to the training/development label/target raster
  dev_label: ./experiment/input/data/demo_data/dev/example_label.tif
  # test_image: path to the optional test image raster (paired with test_label)
  test_image: ./experiment/input/data/demo_data/test/example_image.tif
  # test_label: path to the optional test label raster (paired with test_image)
  test_label: ./experiment/input/data/demo_data/test/example_label.tif
  # dataset_config: path to the dataset metadata JSON file
  dataset_config: ./experiment/input/data/demo_data/example_config.json

data-prepare:
  # ---------------------------------------------------------------------------
  # Dataset Splitting & Class Balancing
  # ---------------------------------------------------------------------------
  # val_ratio: ratio of data blocks partitioned for validation (0.0 to 1.0)
  val_ratio: 0.15
  # test_ratio: ratio of data blocks partitioned for testing (ignored if explicit test files are given)
  test_ratio: 0.10
  # target_head: oversampling target head name (set null to disable class-based oversampling)
  target_head: null
  # reward_classes: dictionary mapping 0-based class indices to float sampling weight rewards (e.g. {1: 2.0})
  reward_classes: {}

model-train:
  # ---------------------------------------------------------------------------
  # Paths, Training Hyperparameters & Model Body
  # ---------------------------------------------------------------------------
  # model_body: model architecture body name. Choices: "unet", "unetpp", "unetppp"
  model_body: unetppp
  # bottleneck: model bottleneck layer type. Choices: "conv", "transformer", "hybrid"
  bottleneck: transformer
  # conditioners: feature conditioning/fusion methods. Choices: list of ["concat", "film"]
  conditioners: [concat, film]
  # patch_size: patch size in pixels cropped from tiles for loader (must divide tile size)
  patch_size: 128
  # batch_size: number of samples per training batch
  batch_size: 16
  # epochs: maximum number of training epochs
  epochs: 10
  # active_tasks: tasks (heads) to train (set to [] for all active). Must be defined in dataset_config.json
  active_tasks: []