# =============================================================================
# USER CONFIGURATION
# -----------------------------------------------------------------------------
# This file provides inputs for the three sequential experiment pipelines:
#
#   1. data-ingest: Ingests datasets, grid references, & domains.
#      - Typically run once (unless raw input datasets/rasters change).
#
#   2. data-prepare: Handles block splits & class balancing.
#      - The middle preparation layer, occasionally adjusted.
#
#   3. model-train: Configures model structure & session params.
#      - Modified frequently during iterative modeling/hyperparameter tuning.
# =============================================================================

# Root directory for experiment outputs, logs, and checkpoints
exp_root: ./experiment

data-ingest:
  # ---------------------------------------------------------------------------
  # Spatial Reference & Grid Tiling Details
  # ---------------------------------------------------------------------------
  # Projected Coordinate Reference System (must be valid EPSG code)
  # NOTE: CRS must be the same for ALL input rasters below!
  grid_crs: EPSG:3161
  # Path to reference raster defining extent
  grid_extent_path: ./experiment/input/extent_reference/sample_extent.tif
  # Tile dimension in pixels (both row and column sizes)
  tile_size: 256
  # Tile overlap in pixels for spatial augmentation/coverage
  tile_overlap: 128

  # ---------------------------------------------------------------------------
  # Optional Domain Context Rasters
  # ---------------------------------------------------------------------------
  # External rasters for conditioning or feature augmentation
  domain_files:
    - path: ./experiment/input/domain_knowledge/sample_domain_1.tif
      index_base: 1
    - path: ./experiment/input/domain_knowledge/sample_domain_2.tif
      index_base: 1
  # Domain layer for categorical IDs (null to disable)
  domain_ids_name: null
  # Domain layer for continuous vectors (null to disable)
  domain_vec_name: null

  # ---------------------------------------------------------------------------
  # Datablock Inputs
  # ---------------------------------------------------------------------------
  # Unique name identifying this dataset configuration
  dataset_name: sample_data

  # Development dataset paths (training image/label)
  dev_image: ./experiment/input/data/sample_dev_image.tif
  dev_label: ./experiment/input/data/sample_dev_label.tif

  # Optional test dataset paths (eval image/label)
  test_image: ./experiment/input/data/sample_test_image.tif
  test_label: ./experiment/input/data/sample_test_label.tif

  # Path to the dataset metadata JSON file
  dataset_config: ./experiment/input/data/sample_config.json
  # Force rebuild all ingestion artifacts even if they exist
  rebuild: false

data-prepare:
  # ---------------------------------------------------------------------------
  # Dataset Splitting & Class Balancing
  # ---------------------------------------------------------------------------
  # Ratio of data blocks partitioned for validation (0.0 to 1.0)
  val_ratio: 0.15
  # Test partition ratio (ignored if explicit test files provided above)
  test_ratio: 0.10
  # Oversampling target head name (null to disable)
  target_head: null
  # Map of class index (0-based) to oversampling reward (e.g., {1: 2.0})
  reward_classes: {}
  # Force rebuild splits & normalization even if they exist
  rebuild: false

model-train:
  # ---------------------------------------------------------------------------
  # Model Architecture & Training Hyperparameters
  # ---------------------------------------------------------------------------
  # Model body name (choices: "unet", "unetpp", "unetppp")
  model_body: unetppp
  # Bottleneck type (choices: "conv", "transformer", "hybrid")
  bottleneck: transformer
  # Conditioning/fusion methods (choices: list of [concat, film])
  conditioners: [concat, film]
  # Pixel patch size for loader (must divide tile_size)
  patch_size: 128
  # Number of samples per training batch
  batch_size: 16
  # Maximum number of training epochs
  epochs: 10
  # Tasks/heads to train. [] or null means all heads are active.
  # Heads Must be defined in dataset_config.json
  active_tasks: []